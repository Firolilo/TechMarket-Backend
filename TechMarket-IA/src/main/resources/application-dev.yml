spring:
  datasource:
    url: jdbc:h2:mem:TECHMARKETia;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

management:
  health:
    mongo:
      enabled: false
    redis:
      enabled: false

logging:
  level:
    com.techmarket: DEBUG
